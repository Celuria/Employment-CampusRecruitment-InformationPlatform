server:
  port: 8080
  mode: debug # debug | release | test

database:
  host: 127.0.0.1
  port: 3306
  user: employ_user
  password: "123456"
  dbname: campus_recruitment
  charset: utf8mb4
  max_idle_conns: 10
  max_open_conns: 100
  auto_migrate: true  # 首次使用 scripts/init_database.sql 建表时请保持 false

jwt:
  secret: change-me-in-production
  expire_hours: 2
  remember_expire_hours: 168

log:
  level: info # debug | info | warn | error
  filename: logs/app.log
  max_size: 100
  max_backups: 30
  max_age: 30

cors:
  allow_origins:
    - http://localhost:5173
  allow_methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
    - OPTIONS
  allow_headers:
    - Authorization
    - Content-Type

auth:
  max_login_attempts: 5
  lock_minutes: 15

email:
  # ====== 以下为【发件】配置，只需一个发件账号即可向任意邮箱发送提醒 ======
  enabled: true                 # 是否启用邮件提醒
  smtp_host: smtp.qq.com       # SMTP 服务器地址（QQ: smtp.qq.com | 163: smtp.163.com）
  smtp_port: 587               # SMTP 端口（587=STARTTLS, 465=SSL）
  username: 3474124177@qq.com  # 发件邮箱地址（完整地址）
  password: "msgtefcqzzzbcicf"         # 【授权码】非登录密码！QQ/163邮箱需在设置中生成
  from_name: 就业中心           # 收件人看到的发件人名称
